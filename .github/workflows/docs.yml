name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install dependencies ──────────────────────────
      - run: pip install mkdocs-material mkdocstrings[python] mkdocs-gen-files pyyaml

      # ── Step 1: Auto-generate AI documentation ─────────
      - name: Generate AI docs (llms.txt, llms-full.txt, AGENTS.md)
        run: python3 scripts/generate_ai_docs.py

      # ── Step 2: Commit regenerated AI docs if changed ──
      - name: Commit auto-generated AI docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llms.txt llms-full.txt AGENTS.md
          git diff --staged --quiet || git commit -m "docs: auto-update AI docs [skip ci]"
          git push

      # ── Step 3: Build & deploy MkDocs site ─────────────
      - name: Build and deploy MkDocs
        run: mkdocs gh-deploy --force
