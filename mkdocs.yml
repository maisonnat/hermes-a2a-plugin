site_name: Hermes A2A Plugin
site_description: A2A (Agent2Agent) protocol plugin for Hermes Agent
site_url: https://maisonnat.github.io/hermes-a2a-plugin/
repo_url: https://github.com/maisonnat/hermes-a2a-plugin
repo_name: maisonnat/hermes-a2a-plugin

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - gen-files:
      scripts:
        - docs/scripts/gen_api_docs.py
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Design System: DESIGN.md
  - Guides:
    - Usage: guides/usage.md
    - Configuration: guides/configuration.md
    - Development: guides/development.md
    - Troubleshooting: guides/troubleshooting.md
    - OpenCode Integration: guides/opencode-integration.md
  - API Reference:
    - Plugin: api/reference.md
    - Server: api/server.md
    - Bridge: api/bridge.md
    - MCP Bridge: api/bridge_mcp.md
    - Schemas: api/schemas.md
  - Research:
    - python-a2a SDK: research/python-a2a-sdk.md
